events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rate limiting zone for mobile API endpoints
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream nextjs_api {
        server web:3000;
    }

    server {
        listen 80;
        server_name assetpulse.divyasree.com;

        # Redirect HTTP to HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name assetpulse.divyasree.com;

        ssl_certificate     /etc/ssl/certs/assetpulse.crt;
        ssl_certificate_key /etc/ssl/certs/assetpulse.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # API Reverse Proxy Routing
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://nextjs_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable caching on dynamic API routes
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # Static Media & QR Assets
        location /uploads/ {
            alias /var/www/uploads/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }
}
